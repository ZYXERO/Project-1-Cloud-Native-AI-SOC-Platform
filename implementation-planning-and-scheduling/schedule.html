<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud-Native AI SOC — Execution Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    :root{
      --bg:#f4f5f7;--surface:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;
      --learn:#e5e7eb;--build:#7c3aed;--accent:#7c3aed;--radius:12px;--font:Inter,system-ui,sans-serif;
    }
    html,body{margin:0;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);line-height:1.5}
    .wrap{max-width:1100px;margin:0 auto;padding:24px 20px 48px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:8px}
    .top h1{margin:0;font-size:1.35rem;font-weight:700;letter-spacing:-.02em}
    .meta{color:var(--muted);font-size:.82rem;margin-top:4px}
    .copy-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:.8rem;font-weight:500}
    .copy-btn:hover{background:#f9fafb}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
    .stat b{display:block;font-size:1.6rem;font-weight:700;color:var(--accent)}
    .stat span{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .tab{padding:10px 18px;border-radius:999px;border:none;font-weight:600;font-size:.85rem;cursor:pointer;color:#fff;opacity:.55;transition:opacity .15s,transform .15s}
    .tab:hover{opacity:.85}
    .tab.active{opacity:1;transform:scale(1.02)}
    .view-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
    .view-tab{padding:10px 16px;border:none;background:none;cursor:pointer;font-weight:600;font-size:.85rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
    .view-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .panel{display:none}
    .panel.active{display:block}
    .week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .week-head{padding:20px 22px;border-bottom:1px solid var(--border)}
    .week-head-top{display:flex;align-items:flex-start;gap:12px}
    .wk-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
    .week-head h2{margin:0;font-size:1.05rem;font-weight:700}
    .week-dates{color:var(--muted);font-size:.82rem;margin-top:2px}
    .tag{display:inline-block;font-size:.65rem;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle}
    .tag-mvp{background:#fef3c7;color:#b45309}
    .tag-prod{background:#dbeafe;color:#1d4ed8}
    .week-desc{margin:12px 0 0;font-size:.88rem;color:var(--muted)}
    .bars{display:flex;gap:16px;margin-top:14px;align-items:center;flex-wrap:wrap}
    .bar-wrap{flex:1;min-width:200px}
    .bar-label{font-size:.72rem;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
    .bar{height:8px;border-radius:4px;background:var(--learn);overflow:hidden}
    .bar-fill{height:100%;border-radius:4px}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border)}
    @media(max-width:720px){.cols{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
    .col{padding:18px 22px}
    .col:first-child{border-right:1px solid var(--border)}
    @media(max-width:720px){.col:first-child{border-right:none;border-bottom:1px solid var(--border)}}
    .col h3{margin:0 0 12px;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;gap:6px}
    .col ul{margin:0;padding-left:18px}
    .col li{margin-bottom:8px;font-size:.86rem}
    .deliverable{margin:0 22px 18px;padding:14px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:.86rem}
    .deliverable strong{display:block;font-size:.72rem;text-transform:uppercase;color:#166534;margin-bottom:6px}
    .deps{padding:14px 22px 18px;border-top:1px solid var(--border);font-size:.82rem}
    .deps strong{color:var(--muted);font-size:.72rem;text-transform:uppercase;margin-right:8px}
    .dep-pill{display:inline-block;background:#f3f4f6;border-radius:6px;padding:4px 10px;margin:4px 4px 0 0;font-size:.78rem}
    .gantt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px}
    .gantt h3{margin:0 0 16px;font-size:.95rem}
    .gantt-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .gantt-label{width:36px;font-weight:700;font-size:.8rem}
    .gantt-bar{flex:1;height:28px;display:flex;border-radius:6px;overflow:hidden;background:var(--learn)}
    .gantt-learn{height:100%}
    .gantt-build{height:100%}
    .gantt-mile{font-size:.75rem;color:var(--muted);width:120px;text-align:right}
    .notes{display:grid;gap:12px}
    .note{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
    .note b{display:block;font-size:.88rem;margin-bottom:4px}
    .note p{margin:0;font-size:.84rem;color:var(--muted)}
    .avail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:800px){.avail-grid{grid-template-columns:1fr}}
    .day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
    .day-card h3{margin:0 0 4px;font-size:.95rem}
    .day-card .sub{font-size:.78rem;color:var(--muted);margin-bottom:12px}
    .slot{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:.82rem}
    .slot:last-child{border-bottom:none}
    .slot-time{width:100px;flex-shrink:0;color:var(--muted);font-weight:500;font-size:.75rem}
    .slot.work .slot-label{color:#5b21b6;font-weight:600}
    .slot.work{background:linear-gradient(90deg,#f5f3ff 0%,transparent 100%);margin:0 -8px;padding:8px;border-radius:6px}
    .hours-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-top:16px}
    .hours-box table{width:100%;font-size:.86rem;border-collapse:collapse}
    .hours-box td,.hours-box th{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
    .hours-box th{color:var(--muted);font-size:.72rem;text-transform:uppercase}
    .progress-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;justify-content:center;gap:24px;font-size:.8rem;color:var(--muted);z-index:10}
    body{padding-bottom:48px}
    .daily-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
    .daily-toolbar select,.daily-toolbar input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem}
    .day-list{display:flex;flex-direction:column;gap:14px}
    .day-card-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .day-card-full.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
    .day-card-head{padding:14px 18px;background:#fafafa;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;align-items:center;gap:10px}
    .day-card-head h3{margin:0;font-size:1rem;flex:1}
    .day-meta{font-size:.78rem;color:var(--muted)}
    .wk-pill{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff}
    .heavy-pill{background:#ede9fe;color:#5b21b6}
    .light-pill{background:#f3f4f6;color:#4b5563}
    .milestone-bar{padding:10px 18px;background:#ecfdf5;border-bottom:1px solid #bbf7d0;font-size:.84rem;color:#166534}
    .block-row{display:grid;grid-template-columns:110px 56px 1fr;gap:12px;padding:12px 18px;border-bottom:1px solid #f3f4f6;align-items:start;font-size:.86rem}
    .block-row:last-child{border-bottom:none}
    .block-time{font-weight:600;color:var(--muted);font-size:.78rem}
    .block-hrs{font-size:.72rem;color:var(--muted)}
    .mode-learn{color:#5b21b6;font-weight:700;font-size:.68rem;text-transform:uppercase}
    .mode-build{color:#0d9488;font-weight:700;font-size:.68rem;text-transform:uppercase}
    .err-box{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:16px;border-radius:8px;margin:20px 0}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    .wrap-wide{max-width:1280px}
    .wk-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
    .wk-toolbar .wk-title{flex:1;font-weight:700;font-size:1rem}
    .wk-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;font-size:.7rem}
    .wk-legend span{padding:4px 10px;border-radius:6px;border-left:3px solid}
    .wk-scroll{overflow-x:auto;padding-bottom:8px}
    .wk-grid{display:grid;grid-template-columns:repeat(7,minmax(155px,1fr));gap:10px;min-width:1000px}
    .wk-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-height:320px}
    .wk-col.today-col{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
    .wk-col.before-sprint{opacity:.55}
    .wk-col-head{padding:12px 10px;border-bottom:1px solid var(--border);text-align:center;background:#fafafa;border-radius:var(--radius) var(--radius) 0 0}
    .wk-col-head .dow{font-size:.68rem;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.04em}
    .wk-col-head .dat{font-size:.9rem;font-weight:700;margin-top:2px}
    .wk-col-head .badge{font-size:.65rem;margin-top:6px;display:inline-block;padding:2px 8px;border-radius:999px}
    .wk-slots{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
    .wk-slot{padding:8px 9px;border-radius:8px;font-size:.71rem;line-height:1.35;border-left:3px solid;background:#f9fafb}
    .wk-slot .t{display:block;font-weight:600;color:var(--muted);font-size:.65rem;margin-bottom:3px}
    .wk-slot .l{display:block}
    .wk-slot .soc-detail{margin-top:5px;padding-top:5px;border-top:1px dashed rgba(0,0,0,.08);font-size:.68rem}
    .wk-slot .soc-detail em{font-style:normal;font-weight:700;text-transform:uppercase;font-size:.62rem}
    .wk-slot.cat-life{border-color:#9ca3af;background:#f9fafb}
    .wk-slot.cat-admin{border-color:#60a5fa;background:#eff6ff}
    .wk-slot.cat-food{border-color:#f59e0b;background:#fffbeb}
    .wk-slot.cat-fitness{border-color:#f97316;background:#fff7ed}
    .wk-slot.cat-family{border-color:#f472b6;background:#fdf2f8}
    .wk-slot.cat-free{border-color:#d1d5db;background:#f3f4f6;border-style:dashed}
    .wk-slot.cat-work{border-color:#7c3aed;background:#f5f3ff}
    .wk-slot.cat-work.soc-learn{border-color:#7c3aed;background:#ede9fe}
    .wk-slot.cat-work.soc-build{border-color:#0d9488;background:#ecfdf5}
    .wk-milestone{margin:8px;padding:8px;background:#ecfdf5;border-radius:6px;font-size:.68rem;color:#166534}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 id="page-title">Cloud-Native AI SOC Platform — Execution Schedule</h1>
        <p class="meta" id="page-meta">May 20 → June 30 · 6 weeks · 45 hrs/week · 270 hrs · 40% learn / 60% build</p>
      </div>
      <button type="button" class="copy-btn" id="copy-week">Copy week</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="view-tabs">
      <button type="button" class="view-tab active" data-view="weekly">Weekly columns</button>
      <button type="button" class="view-tab" data-view="daily">Day-by-day</button>
      <button type="button" class="view-tab" data-view="sprint">Sprint plan</button>
      <button type="button" class="view-tab" data-view="overview">Overview & Gantt</button>
      <button type="button" class="view-tab" data-view="availability">My routine</button>
    </div>

    <div class="panel active" id="panel-weekly">
      <div class="wk-toolbar">
        <button type="button" class="btn btn-ghost" id="wk-prev">← Prev week</button>
        <span class="wk-title" id="wk-title">Week 1</span>
        <button type="button" class="btn btn-ghost" id="wk-next">Next week →</button>
        <button type="button" class="btn btn-ghost" id="wk-today">This week</button>
      </div>
      <div class="wk-legend" id="wk-legend">
        <span class="cat-life" style="border-color:#9ca3af;background:#f9fafb">Life</span>
        <span class="cat-admin" style="border-color:#60a5fa;background:#eff6ff">Admin</span>
        <span class="cat-food" style="border-color:#f59e0b;background:#fffbeb">Meals</span>
        <span class="cat-fitness" style="border-color:#f97316;background:#fff7ed">Gym</span>
        <span class="cat-family" style="border-color:#f472b6;background:#fdf2f8">Family</span>
        <span class="cat-work" style="border-color:#7c3aed;background:#f5f3ff">SOC · Learn</span>
        <span class="cat-work" style="border-color:#0d9488;background:#ecfdf5">SOC · Build</span>
        <span class="cat-free" style="border-color:#d1d5db;background:#f3f4f6">Free</span>
      </div>
      <div class="wk-scroll">
        <div class="wk-grid" id="wk-grid"></div>
      </div>
    </div>

    <div class="panel" id="panel-daily">
      <div class="daily-toolbar">
        <label>Week <select id="daily-week-filter"><option value="all">All weeks</option></select></label>
        <label>Jump to <input type="date" id="daily-jump" min="2026-05-20" max="2026-06-30" value="2026-05-20" /></label>
        <button type="button" class="copy-btn" id="copy-day">Copy selected day</button>
      </div>
      <div id="daily-list" class="day-list"><p class="loading">Loading schedule…</p></div>
    </div>

    <div class="panel" id="panel-sprint">
      <div class="tabs" id="week-tabs"></div>
      <div id="week-detail"></div>
    </div>

    <div class="panel" id="panel-overview">
      <div class="gantt" id="gantt"></div>
      <div class="notes" id="arch-notes"></div>
      <div class="hours-box" id="hours-math"></div>
    </div>

    <div class="panel" id="panel-availability">
      <div class="avail-grid" id="avail-grid"></div>
      <div class="hours-box" id="weekly-allocation"></div>
    </div>
  </div>

  <div class="progress-footer">
    <span>MVP target: <strong>Week 3</strong></span>
    <span>Production deploy: <strong>Week 5–6</strong></span>
    <span>Goal: <strong>Portfolio-ready SOC by June 30</strong></span>
  </div>

  <script>
const PROJECT = {
  title: "Cloud-Native AI SOC Platform",
  subtitle: "Execution Schedule",
  start: "May 20",
  end: "June 30",
  weeks: 6,
  hrsPerWeek: 45,
  totalHrs: 270,
  learnPct: 40,
  buildPct: 60,
  learnHrs: 108,
  buildHrs: 162,
  mvpWeek: 3,
};

const WEEKS = [
  {
    n: 1,
    color: "#7c3aed",
    tag: null,
    title: "Architecture, Auth & Core API Foundation",
    dates: "May 20 – May 25",
    focus:
      "System design lockdown, project scaffolding, JWT auth, PostgreSQL schema, Docker Compose for local dev stack.",
    learnH: 18,
    buildH: 27,
    learning: [
      "REST API design patterns — resource naming, status codes, versioning",
      "JWT deep dive — signing, expiry, refresh token flow, secure storage",
      "PostgreSQL schema design — normalization, indexes, JSONB for log payloads",
      "Docker Compose multi-service setup — networking, volumes, healthchecks",
    ],
    building: [
      "Finalize system architecture doc (services, data flow, API contracts)",
      "Scaffold monorepo: /frontend, /backend, /infra, /ai, /kafka",
      "Docker Compose: Postgres + Redis + backend + frontend wired up",
      "Database schema: users, incidents, logs, alerts, audit_logs",
      "Backend skeleton: health endpoints, error middleware, config management",
      "JWT auth: register, login, refresh, logout with token rotation",
      "Alembic/Sequelize migrations baseline committed",
    ],
    deliverable:
      "Running local dev stack (docker compose up = all services healthy). JWT auth tested via Postman/HTTPie. Schema migrations committed. Architecture doc finalized.",
    dependencies: ["None — week 1 is the foundation everything else builds on"],
  },
  {
    n: 2,
    color: "#0d9488",
    tag: null,
    title: "Log Ingestion Pipeline — Kafka + PostgreSQL + Redis",
    dates: "May 26 – June 1",
    focus:
      "Real-time log ingestion via Kafka, persistence to PostgreSQL, Redis caching layer, REST endpoints serving cached data.",
    learnH: 18,
    buildH: 27,
    learning: [
      "Kafka fundamentals — topics, partitions, consumer groups, offset management",
      "Redis caching patterns — cache-aside, TTL strategy, invalidation",
      "Kafka Node.js/Python client — producer/consumer library choice",
      "Event-driven architecture — at-least-once delivery, idempotent consumers",
    ],
    building: [
      "Add Kafka + Zookeeper to Docker Compose",
      "Log producer service — synthetic logs (syslog, Windows Event, CloudTrail)",
      "Log consumer service — persist to PostgreSQL with deduplication",
      "Redis caching layer on query endpoints",
      "REST endpoints: GET /logs, POST /logs/ingest, GET /incidents",
      "Log schema validation middleware",
      "Basic alert rule engine — flag logs by severity",
      "Seed script for 10k+ realistic log events",
    ],
    deliverable:
      "End-to-end pipeline: synthetic logs → Kafka → PostgreSQL. Redis cache reduces query latency measurably. Kafka consumer lag monitored.",
    dependencies: [
      "Week 1 auth system",
      "Week 1 Docker Compose stack",
      "Week 1 PostgreSQL schema",
    ],
  },
  {
    n: 3,
    color: "#ea580c",
    tag: "MVP",
    title: "MVP — React Dashboard + Basic AI Incident Summarization",
    dates: "June 2 – June 8",
    focus:
      "React dashboard consuming live APIs, first AI component (LLM incident summarization), end-to-end MVP.",
    learnH: 18,
    buildH: 27,
    learning: [
      "Next.js App Router + SWR/React Query — data fetching, optimistic UI",
      "LLM API integration — OpenAI/Anthropic, prompt engineering for security context",
      "Vector embeddings basics — cosine similarity, chunking (scaffold for Week 4 RAG)",
      "Recharts / Shadcn UI — charting and design system components",
    ],
    building: [
      "Next.js dashboard scaffold — auth-protected routes, JWT token management",
      "Incident feed page — severity badges, pagination, search/filter",
      "Log stream view — real-time updates via polling (SSE upgrade in Week 4)",
      "Metrics overview — incidents by severity, log volume over time (Recharts)",
      "LLM incident summarizer service — raw log cluster → plain-English summary",
      "POST /ai/summarize integrated into incident detail view",
      "Alert notification panel in dashboard",
      "First CI pipeline — GitHub Actions lint + test + Docker build on push",
    ],
    deliverable:
      "Functional MVP: login → dashboard → live incident feed → click incident → AI summary. Green CI pipeline. Demo-able to stakeholders.",
    dependencies: [
      "Week 1 auth",
      "Week 2 Kafka pipeline + REST endpoints",
      "LLM API key obtained",
    ],
  },
  {
    n: 4,
    color: "#b45309",
    tag: null,
    title: "RAG Pipeline — Vector DB, Embeddings & Intelligent Search",
    dates: "June 9 – June 15",
    focus:
      "Full RAG system — embed historical incidents, vector similarity search, context-aware AI analysis. Replace naive LLM calls with RAG.",
    learnH: 18,
    buildH: 27,
    learning: [
      "RAG architecture — retrieval-augmented generation end-to-end",
      "pgvector / Pinecone / Qdrant — vector storage, similarity search, index types",
      "Embedding pipelines — chunking strategy, ada-002 or local models, batch upserts",
      "Prompt engineering for RAG — context injection, hallucination mitigation, SOC analyst persona",
    ],
    building: [
      "pgvector extension on PostgreSQL or Qdrant container in Compose",
      "Embedding pipeline: incidents/logs → embeddings → vector store",
      "Kafka consumer hook: new log batches trigger embedding pipeline",
      "RAG query service: query → embed → top-k → LLM → structured response",
      "Replace naive summarizer with RAG-powered summarizer",
      "POST /ai/analyze — incident analysis with citations",
      "\"Ask the SOC\" natural language search bar in dashboard",
      "SSE endpoint for real-time log streaming in UI",
    ],
    deliverable:
      "RAG fully integrated. Natural language search in dashboard. AI analysis cites historical incidents. Real-time SSE log stream live.",
    dependencies: [
      "Week 3 LLM integration",
      "Week 2 Kafka pipeline",
      "pgvector or Qdrant in compose",
    ],
  },
  {
    n: 5,
    color: "#2563eb",
    tag: "Prod",
    title: "AWS Deployment — EC2, S3, IAM + Security Hardening",
    dates: "June 16 – June 22",
    focus:
      "Production-grade AWS deployment. All services containerized on EC2. S3 log archival. IAM least-privilege. HTTPS enforced.",
    learnH: 18,
    buildH: 27,
    learning: [
      "AWS EC2 + security groups — instance sizing, SGs as firewall, key pairs",
      "IAM roles vs users — least-privilege, instance profiles, no hardcoded creds",
      "S3 bucket policies + lifecycle rules — log archival, presigned URLs, versioning",
      "HTTPS + reverse proxy — Nginx + Certbot or AWS ACM + ALB",
    ],
    building: [
      "EC2 provisioned (t3.medium/large), Docker + Compose installed",
      "All services deployed via docker-compose on EC2",
      "Nginx reverse proxy: /api → backend, / → frontend, SSL via Certbot",
      "IAM role on EC2 — least-privilege S3 + CloudWatch (no root creds)",
      "S3 integration — raw logs archived from Kafka consumer",
      "Secrets management — AWS Secrets Manager, .env never committed",
      "Security hardening — rate limiting, CORS, helmet, SQL injection audit",
      "OAuth2 social login (Google) added to auth",
      "CloudWatch basic metrics + alarms (CPU, memory, error rate)",
    ],
    deliverable:
      "Public HTTPS SOC platform. All services on EC2. Logs archiving to S3. IAM properly scoped. Security audit checklist green.",

const SPRINT_WEEK_ANCHORS = [
  { n: 1, anchor: "2026-05-20" },
  { n: 2, anchor: "2026-05-26" },
  { n: 3, anchor: "2026-06-02" },
  { n: 4, anchor: "2026-06-09" },

  { n: 6, anchor: "2026-06-23" },
];

const SCHEDULE_RANGE = { start: "2026-05-20", end: "2026-06-30" };

function _fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function isHeavyDayOfWeek(dow) {
  return _HEAVY_DOW.includes(dow);
}

function sundayWeekStart(isoDate) {
  const d = new Date(isoDate + "T12:00:00");
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  return _fmt(d);
}

function getWeekDates(weekNum) {
  const anchor = SPRINT_WEEK_ANCHORS.find((w) => w.n === weekNum);
  if (!anchor) return [];
  const start = sundayWeekStart(anchor.anchor);
  const days = [];
  const d = new Date(start + "T12:00:00");
  for (let i = 0; i < 7; i++) {
    days.push(_fmt(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function buildMergedDay(date) {
  const d = new Date(date + "T12:00:00");
  const dow = d.getDay();
  const heavy = isHeavyDayOfWeek(dow);
  const template = heavy ? ROUTINE_HEAVY_DETAIL : ROUTINE_LIGHT_DETAIL;
  const inSprint = date >= SCHEDULE_RANGE.start && date <= SCHEDULE_RANGE.end;
  const socDay = inSprint ? DAILY_PLAN.find((x) => x.date === date) : null;
  const socByTime = {};
  if (socDay) {
    socDay.blocks.forEach((b) => {
      socByTime[b.time] = b;
    });
  }

  const slots = template.map((slot) => {
    const item = { ...slot, soc: null };
    if (slot.cat === "work" && slot.workKey && socByTime[slot.workKey]) {
      const b = socByTime[slot.workKey];
      item.soc = { mode: b.mode, task: b.task, hrs: b.hrs };
    }
    return item;
  });

  return {
    date,
    day: d.toLocaleDateString("en-US", { weekday: "long" }),
    dow,
    heavy,
    inSprint,
    week: inSprint ? _weekForDate(d) : null,
    milestone: _MILESTONES[date] || null,
    slots,
  };
}

function _weekForDate(d) {
  const t = d.getTime();
  if (t >= new Date(2026, 5, 23).getTime()) return 6;
  if (t >= new Date(2026, 5, 16).getTime()) return 5;
  if (t >= new Date(2026, 5, 9).getTime()) return 4;
  if (t >= new Date(2026, 5, 2).getTime()) return 3;
  if (t >= new Date(2026, 4, 26).getTime()) return 2;
  return 1;
}

function generateDailyPlan() {
  const queues = {};
  WEEKS.forEach((w) => {
    queues[w.n] = { learn: [...w.learning], build: [...w.building], li: 0, bi: 0 };
  });

  function nextTask(week, prefer) {
    const q = queues[week];
    if (prefer === "learn" && q.li < q.learn.length)
      return { mode: "learn", text: q.learn[q.li++] };
    if (q.bi < q.build.length) return { mode: "build", text: q.build[q.bi++] };
    if (q.li < q.learn.length) return { mode: "learn", text: q.learn[q.li++] };
    return { mode: "build", text: "Integration, tests, PR review, docs — week deliverable push" };
  }

  const days = [];
  const start = new Date(2026, 4, 20);
  const end = new Date(2026, 5, 30);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const date = _fmt(d);
    const week = _weekForDate(d);
    const heavy = _HEAVY_DOW.includes(d.getDay());
    const template = heavy ? _HEAVY_BLOCKS : _LIGHT_BLOCKS;
    const blocks = template.map((b) => {
      const t = nextTask(week, b.prefer);
      return { time: b.time, hrs: b.hrs, mode: t.mode, task: t.text };
    });
    const w = WEEKS.find((x) => x.n === week);
    days.push({
      date,
      day: d.toLocaleDateString("en-US", { weekday: "long" }),
      week,
      weekTitle: w.title,
      heavy,
      blocks,
      milestone: _MILESTONES[date] || null,
      dayTotal: Math.round(blocks.reduce((s, b) => s + b.hrs, 0) * 100) / 100,
    });
  }
  return days;
}

        document.getElementById("panel-" + tab.dataset.view).classList.add("active");
        document.querySelector(".wrap").classList.toggle("wrap-wide", tab.dataset.view === "weekly");
        if (tab.dataset.view === "weekly") renderWeeklyColumns();
      };
    });

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
    }

    function renderDaily() {
      const today = new Date();
      const todayKey = today.getFullYear() + "-" +
        String(today.getMonth()+1).padStart(2,"0") + "-" +
        String(today.getDate()).padStart(2,"0");

      const filtered = DAILY_PLAN.filter((d) =>
        dailyFilter === "all" || d.week === +dailyFilter
      );

      const list = document.getElementById("daily-list");
      if (!filtered.length) {
        list.innerHTML = "<p class='loading'>No days match filter.</p>";
        return;
      }

      list.innerHTML = filtered.map((d) => {
        const w = WEEKS.find((x) => x.n === d.week);
        const isToday = d.date === todayKey;
        const sel = d.date === selectedDayDate;
        return `
        <article class="day-card-full${isToday ? " today" : ""}" id="day-${d.date}" data-date="${d.date}" style="${sel ? "outline:2px solid var(--accent)" : ""}">
          <div class="day-card-head">
            <h3>${esc(d.day)}, ${esc(new Date(d.date + "T12:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }))}</h3>
            <span class="wk-pill" style="background:${w.color}">Week ${d.week}</span>
            <span class="${d.heavy ? "heavy-pill" : "light-pill"}">${d.heavy ? "Heavy day · 4 blocks" : "Light day · 2 blocks"}</span>
            <span class="day-meta">${d.dayTotal}h scheduled · ${esc(d.weekTitle)}</span>
          </div>
          ${d.milestone ? `<div class="milestone-bar"><strong>Milestone:</strong> ${esc(d.milestone)}</div>` : ""}
          ${d.blocks.map((b) => `
            <div class="block-row">
              <span class="block-time">${esc(b.time)}</span>
              <span class="block-hrs">${b.hrs}h</span>
              <div>
                <span class="mode-${b.mode}">${b.mode === "learn" ? "Learn" : "Build"}</span>
                <div>${esc(b.task)}</div>
              </div>
            </div>`).join("")}
        </article>`;
      }).join("");

      list.querySelectorAll(".day-card-full").forEach((el) => {
        el.onclick = () => {
          selectedDayDate = el.dataset.date;
          document.getElementById("daily-jump").value = selectedDayDate;
          renderDaily();
        };
      });
    }

    function initDailyControls() {
      const sel = document.getElementById("daily-week-filter");
      WEEKS.forEach((w) => {
        const o = document.createElement("option");
        o.value = w.n;
        o.textContent = `Week ${w.n}: ${w.dates}`;
        sel.appendChild(o);
      });
      sel.onchange = () => { dailyFilter = sel.value; renderDaily(); };
      document.getElementById("daily-jump").onchange = (e) => {
        const id = "day-" + e.target.value;
        const el = document.getElementById(id);
        if (el) { el.scrollIntoView({ behavior: "smooth", block: "start" }); selectedDayDate = e.target.value; renderDaily(); }
      };
      document.getElementById("copy-day").onclick = async () => {
        const d = DAILY_PLAN.find((x) => x.date === (selectedDayDate || document.getElementById("daily-jump").value));
        if (!d) return;
        const text = `${d.day} ${d.date} (Week ${d.week})\n` +
          d.blocks.map((b) => `${b.time} (${b.hrs}h) [${b.mode}]: ${b.task}`).join("\n") +
          (d.milestone ? `\n\nMilestone: ${d.milestone}` : "");
        try { await navigator.clipboard.writeText(text); } catch (e) { prompt("Copy:", text); }
        document.getElementById("copy-day").textContent = "Copied!";
        setTimeout(() => { document.getElementById("copy-day").textContent = "Copy selected day"; }, 2000);
      };
    }

    document.getElementById("copy-week").onclick = async () => {
      const w = WEEKS.find((x) => x.n === activeWeek);
      const text = `Week ${w.n}: ${w.title}\n${w.dates}\n\nFocus: ${w.focus}\n\nLearning (${w.learnH}h):\n${w.learning.map((t) => "- " + t).join("\n")}\n\nBuilding (${w.buildH}h):\n${w.building.map((t) => "- " + t).join("\n")}\n\nDeliverable: ${w.deliverable}\n\nDependencies: ${w.dependencies.join(", ")}`;
      try { await navigator.clipboard.writeText(text); } catch (e) { prompt("Copy:", text); }
      const btn = document.getElementById("copy-week");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy week"; }, 2000);
    };

    try {
      if (typeof PROJECT === "undefined" || typeof DAILY_PLAN === "undefined" || typeof buildMergedDay === "undefined") {
        throw new Error("Schedule data missing from HTML file. Run: node build-schedule.mjs");
      }
      renderStats();
      renderTabs();
      renderWeek();
      renderGantt();
      renderNotes();
      renderAvailability();
      initDailyControls();
      initWeeklyControls();
      renderWeeklyColumns();
      renderDaily();
      const jump = document.getElementById("daily-jump");
      const now = new Date();
      if (now >= new Date(2026, 4, 20) && now <= new Date(2026, 5, 30)) {
        calendarWeek = _weekForDate(now);
        jump.value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
      }
    } catch (e) {
      showError(e.message);
      console.error(e);
    }
  </script>
</body>
</html>
